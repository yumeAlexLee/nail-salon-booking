version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: nail_salon_mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: nail_salon
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build: ./nail-salon-backend
    container_name: nail_salon_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/nail_salon?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ADMIN_CHAT_ID=${ADMIN_CHAT_ID:-5664502768}
    depends_on:
      - mysql

  frontend:
    build: ./nail-salon-frontend
    container_name: nail_salon_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data:
